name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup npm registry
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4.0.0
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "tag=${TAG##*-}" | sed 's/\.[0-9]*$//' >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: nix develop -c pnpm publish --provenance --no-git-checks --access public --tag ${{ steps.dist-tag.outputs.tag }}

  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Generate draft release notes
        run: pnpm exec changelogithub --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Refine release notes with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" --json body -q .body > /tmp/draft.md
          git diff "${TAG}^...${TAG}" -- src/ > /tmp/diff.txt || true

          cat <<'PROMPT' > /tmp/prompt.md
          You are refining GitHub Release notes for gatecheck.
          gatecheck is an npm CLI tool that sets quality gates on git changes — runs deterministic checks (lint, typecheck, test) and AI-powered reviews against changed files.

          I will provide the draft release notes and the code diff as files.
          Rewrite the release notes in concise, user-focused English. Rules:
          - Group changes into categories: Features, Bug Fixes, Breaking Changes, Internal
          - Each item should describe the user-visible impact, not the implementation detail
          - Drop trivial items (typo fixes, formatting, internal refactors with no user impact)
          - Keep it concise — one line per item
          - Output only the raw markdown body, no fenced code blocks wrapping the entire output
          PROMPT

          claude -p \
            --allowedTools Read \
            --max-turns 5 \
            "$(cat /tmp/prompt.md)

          Draft release notes (/tmp/draft.md):
          $(cat /tmp/draft.md)

          Code diff (/tmp/diff.txt):
          $(cat /tmp/diff.txt)" \
            > /tmp/notes.md

          gh release edit "$TAG" --notes-file /tmp/notes.md --draft=false
