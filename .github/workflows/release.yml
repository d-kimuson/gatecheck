name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup npm registry
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4.0.0
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "tag=${TAG##*-}" | sed 's/\.[0-9]*$//' >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: pnpm publish --provenance --no-git-checks --access public --tag ${{ steps.dist-tag.outputs.tag }}

  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Generate draft release notes
        run: pnpm exec changelogithub --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Refine release notes with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          DRAFT="$(gh release view "$TAG" --json body -q .body)"
          DIFF="$(git diff "${TAG}^...${TAG}" -- src/ || true)"

          NOTES="$(claude -p "You are refining GitHub Release notes for gatecheck ${TAG}.
          gatecheck is an npm CLI tool that sets quality gates on git changes — runs deterministic checks (lint, typecheck, test) and AI-powered reviews against changed files.

          Here are the draft release notes generated from conventional commits:
          ${DRAFT}

          Here is the actual code diff:
          ${DIFF}

          Rewrite the release notes in concise, user-focused English. Rules:
          - Group changes into categories: Features, Bug Fixes, Breaking Changes, Internal
          - Each item should describe the user-visible impact, not the implementation detail
          - Drop trivial items (typo fixes, formatting, internal refactors with no user impact)
          - Keep it concise — one line per item
          - Output only the raw markdown body, no fenced code blocks wrapping the entire output")"

          echo "$NOTES" | gh release edit "$TAG" --notes-file - --draft=false
